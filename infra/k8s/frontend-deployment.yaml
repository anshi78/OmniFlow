apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: omniflow-ai
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: omniflow-frontend:latest
          imagePullPolicy: Never # Using locally built image
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://backend:8000"
            - name: NEXT_PUBLIC_WS_URL
              value: "ws://backend:8000/ws"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: omniflow-ai
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
  selector:
    app: frontend
